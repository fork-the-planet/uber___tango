name: CI check

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build all targets
      run: make build

    - name: Run all tests
      run: make test

    - name: Display test logs on failure
      if: failure()
      run: |
        echo "=== Test logs ==="
        find . -name "test.log" -exec echo "--- {} ---" \; -exec cat {} \; || echo "No test logs found"

  dependencies-and-gazelle:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Run go mod tidy and bazel mod tidy
      run: |
        go mod tidy
        ./tools/bazel mod tidy

    - name: Run gazelle
      run: make gazelle

    - name: Verify no uncommitted changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::Generated files are out of date. Please run 'go mod tidy', 'bazel mod tidy', and 'make gazelle' locally and commit the results."
          git diff
          exit 1
        fi

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - dependencies-and-gazelle
    steps:
      - name: All required checks passed
        run: echo "All required checks passed!" >&2
