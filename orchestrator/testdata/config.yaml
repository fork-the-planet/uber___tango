repository:
  - remote: "git@github:uber/tango"
    full_hash_repos:
      - "//"
      - "//external"
    excluded_files:
      - "*.gen.go"
    exclude_external_targets: true
    bzlmod_enabled: true
    query_timeout: 15

service:
  worker_pool_size: 3
  chunking:
    target_chunk_size: 250
    changed_target_chunk_size: 125
    metadata_map_chunk_size: 50000
