# Storage configuration
# Supported types: "memory", "disk"
storage:
  type: "memory"
  # Disk storage configuration (used when type is "disk")
  # disk:
  #   root_path: "/tmp/tango-storage"

# Repository configuration
repository:
  - remote: "https://github.com/uber/tango.git"
    full_hash_repos:
      - ""
    excluded_files:
      - "^@@?bazel_tools/"
    exclude_external_targets: true
    bzlmod_enabled: true
    query_timeout: 300

# Service configuration
service:
  worker_pool_size: 5
  # root for origin clones; defaults to os.TempDir()/tango-repo-manager
  repo_manager_clone_path: "/tmp/tango-repo-manager"
  # root for worker checkouts; defaults to repo_manager_clone_path/.workers
  worker_root_path: "/tmp/tango/workers"
